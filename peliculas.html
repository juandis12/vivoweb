<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VivoTV - Explora nuestro catálogo completo de películas premium.">
    <title>Películas - VivoTV</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="page-movies">

    <!-- Splash Screen (opcional para consistencia) -->
    <div id="splashScreen" class="splash-screen hidden">
        <div class="splash-logo">VIVO<span>TV</span></div>
    </div>

    <!-- Navbar -->
    <header class="navbar scrolled" id="navbar">
        <div class="logo">VIVO<span>TV</span></div>
        <nav id="mainNav">
            <a href="index.html" id="navInicio">Inicio</a>
            <a href="peliculas.html" class="active" id="navPeliculas">Películas</a>
            <a href="series.html" id="navSeries">Series</a>
            <a href="index.html#linkMyList" id="linkMyList">Mi Lista</a>
        </nav>
        <div class="user-actions">
            <div class="search-box" id="searchBox">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar películas...">
                <button class="btn-clear-search hidden" id="btnClearSearch">&times;</button>
            </div>
            <div id="userProfile" class="user-profile-btn">
                <div class="avatar" id="userAvatar">U</div>
                <span id="userName">Usuario</span>
                <button id="btnLogout" class="btn btn-outline btn-sm">Salir</button>
            </div>
        </div>
    </header>

    <!-- Contenido de Películas -->
    <main id="dashboardSection" class="dashboard-container">
        
        <header class="grid-header">
            <nav class="breadcrumbs">
                <a href="index.html">Inicio</a>
                <span>/</span>
                <span>Películas</span>
            </nav>
            <h1 class="grid-title">Todas las Películas</h1>
            <p class="text-muted">Explora los títulos más populares y mejor valorados.</p>
        </header>

        <section class="movies-grid-container">
            <div id="gridContainer" class="movies-grid">
                <!-- Se llenará dinámicamente -->
                <div class="skeleton-card"></div><div class="skeleton-card"></div>
                <div class="skeleton-card"></div><div class="skeleton-card"></div>
                <div class="skeleton-card"></div><div class="skeleton-card"></div>
            </div>
            
            <div id="gridLoader" class="grid-loader hidden">
                <div class="loader"></div>
            </div>

            <div style="text-align: center; margin-top: 40px;">
                <button id="btnLoadMore" class="btn btn-outline">Cargar más películas</button>
            </div>
        </section>

    </main>

    <!-- Overlay Modal Detalle + Reproductor (Unificado) -->
    <div id="detailModal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-backdrop" id="modalBackdrop"></div>
            <button class="close-modal" id="btnCloseModal" aria-label="Cerrar">&times;</button>
            <div class="modal-body">
                <div class="modal-poster">
                    <img id="modalPosterImg" src="" alt="Poster" loading="lazy">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle">Título</h2>
                    <div class="modal-metadata">
                        <span id="modalYear" class="meta-chip"></span>
                        <span id="modalRating" class="meta-chip badge-green"></span>
                        <span id="modalRuntime" class="meta-chip"></span>
                    </div>
                    <p id="modalOverview" class="modal-overview-text"></p>

                    <!-- Info de Series -->
                    <div id="seriesInfo" class="series-info hidden">
                        <div class="series-stats">
                            <div class="series-stat"><span class="stat-number" id="statSeasons">-</span><span class="stat-label">Temporadas</span></div>
                            <div class="series-stat-divider"></div>
                            <div class="series-stat"><span class="stat-number" id="statEpisodes">-</span><span class="stat-label">Episodios</span></div>
                            <div class="series-stat-divider"></div>
                            <div class="series-stat"><span class="stat-number" id="statStatus">-</span><span class="stat-label">Estado</span></div>
                        </div>
                        <div class="seasons-selector" id="seasonsSelector">
                            <div class="seasons-pills" id="seasonsPills"></div>
                        </div>
                        <div class="episodes-section hidden" id="episodesSection">
                            <p class="seasons-label" id="episodesSectionTitle">Episodios:</p>
                            <div class="episodes-grid" id="episodesGrid"></div>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button class="btn btn-play btn-sm" id="btnModalPlay">Reproducir</button>
                        <button class="btn btn-outline btn-sm" id="btnAddToMyList">
                            <span id="favBtnText">Mi Lista</span>
                        </button>
                    </div>
                    <div class="player-container" id="playerContainer">
                        <div id="videoPlaceholder" class="video-preview-box"></div>
                        <video id="videoPlayer" class="hidden" controls playsinline></video>
                        <iframe id="videoIframe" class="hidden" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <p id="sourceError" class="error-msg hidden">No disponible en este momento.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script type="module" src="./app.js"></script>
</body>
</html>
