<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda - VivoTV Premium</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;600;800&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
</head>
<body class="bg-mesh">
    <!-- Navbar Morphing -->
    <nav class="navbar" id="mainNav">
        <div class="nav-container">
            <a href="index.html" class="logo-text">VIVO<span>TV</span></a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="peliculas.html">Películas</a>
                <a href="series.html">Series</a>
                <a href="milista.html">Mi Lista</a>
            </div>
            <div class="nav-actions">
                <div class="search-container active">
                    <input type="text" placeholder="Buscar..." id="searchInput">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="main-content section-padding">
        <header class="section-header">
            <h1 class="section-title" id="searchTitle">Resultados de búsqueda</h1>
            <p class="section-subtitle" id="searchSubtitle">Mostrando resultados para tu búsqueda.</p>
        </header>

        <!-- Grid de Resultados -->
        <div class="grid-container" id="searchResultsGrid">
            <!-- Skeletons loading... -->
        </div>

        <!-- Empty State -->
        <div id="noResultsState" class="empty-state hidden">
            <div class="empty-icon">🔍</div>
            <h2>No encontramos coincidencias</h2>
            <p>Intenta con otros términos o explora nuestras categorías populares.</p>
            <a href="index.html" class="btn btn-primary">Volver al Inicio</a>
        </div>
    </main>

    <!-- Modal (Shared) -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-content glass-panel" id="modalContent">
            <button class="close-modal" id="btnCloseModal">&times;</button>
            <div class="modal-body">
                <div class="modal-poster">
                    <img id="modalPosterImg" src="" alt="Poster">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle">Título</h2>
                    <div class="modal-metadata">
                        <span id="modalYear" class="meta-chip"></span>
                        <span id="modalRating" class="meta-chip badge-green"></span>
                        <span id="modalRuntime" class="meta-chip"></span>
                    </div>
                    <p id="modalOverview" class="modal-overview-text"></p>
                    
                    <div id="seriesInfo" class="series-info hidden">
                        <div class="seasons-selector" id="seasonsSelector">
                            <div class="seasons-pills" id="seasonsPills"></div>
                        </div>
                        <div class="episodes-section hidden" id="episodesSection">
                            <h4 id="episodesSectionTitle" class="episodes-title"></h4>
                            <div class="episodes-grid" id="episodesGrid"></div>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button class="btn btn-play btn-sm" id="btnModalPlay">Reproducir</button>
                        <button class="btn btn-outline btn-sm" id="btnAddToMyList">
                            <span id="favBtnText">Mi Lista</span>
                        </button>
                    </div>
                    <div class="player-container" id="playerContainer">
                        <div id="videoPlaceholder" class="video-preview-box"></div>
                        <video id="videoPlayer" class="hidden" controls></video>
                        <iframe id="videoIframe" class="hidden" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="config.js"></script>
    <script src="tmdb.js"></script>
    <script src="player.js"></script>
    <script src="app.js"></script>
</body>
</html>
