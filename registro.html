<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - VivoTV Premium</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-mesh">
    <main class="auth-container">
        <!-- Mesh Gradient -->
        <div class="mesh-gradient">
            <div class="mesh-circle circle-1"></div>
            <div class="mesh-circle circle-2"></div>
            <div class="mesh-circle circle-3"></div>
        </div>
        <div class="auth-overlay"></div>

        <div class="auth-card glass-panel">
            <div class="auth-logo"><a href="index.html" style="text-decoration:none; color:inherit;">VIVO<span>TV</span></a></div>
            <h2 id="authTitle">Crea tu cuenta gratuita</h2>
            <p id="authSubtitle">Únete a la mejor experiencia de streaming premium</p>
            
            <form id="loginForm" novalidate>
                <div class="input-group">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" required placeholder="Tu nombre artístico" autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@correo.com" autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required placeholder="••••••••" minlength="6" autocomplete="new-password">
                        <button type="button" class="btn-toggle-pass" id="btnTogglePass">
                            <svg viewBox="0 0 24 24" width="18" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="btnSubmit">
                    <span id="btnText">Registrarme</span>
                    <span class="loader hidden" id="btnLoader"></span>
                </button>
                
                <p id="authError" class="error-msg hidden"></p>
                
                <div class="auth-divider"><span>o continúa con</span></div>
                <p class="auth-toggle">
                    ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
                </p>
            </form>
        </div>
    </main>

    <script type="module" src="./app.js"></script>
</body>
</html>
